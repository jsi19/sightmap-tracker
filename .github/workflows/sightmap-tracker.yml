# Runs every 2 hours (UTC). Add repo secret DISCORD_WEBHOOK_URL in GitHub Settings.
name: SightMap tracker

on:
  schedule:
    # Minute 7 avoids the top-of-hour rush on GitHub’s runners.
    - cron: "7 */2 * * *"
  workflow_dispatch:

concurrency:
  group: sightmap-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            sightmap.db
            changes.log
          key: sightmap-state-v1-${{ github.repository }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ONLY_ON_CHANGES: "true"
        run: python sightmap_tracker.py
