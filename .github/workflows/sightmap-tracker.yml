# Runs every 2 hours (UTC). Add repo secret DISCORD_WEBHOOK_URL in GitHub Settings.
name: SightMap tracker

on:
  schedule:
    # Minute 7 avoids the top-of-hour rush on GitHub’s runners.
    - cron: "7 */2 * * *"
  workflow_dispatch:

concurrency:
  group: sightmap-tracker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore tracker state
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: |
            sightmap.db
            changes.log
          key: sightmap-state-v2-${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            sightmap-state-v2-${{ github.repository }}-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ONLY_ON_CHANGES: "true"
        run: python sightmap_tracker.py

      - name: Build dashboard for GitHub Pages
        run: python export_dashboard.py --output-dir _site

      - name: Save tracker state
        uses: actions/cache/save@v4
        with:
          path: |
            sightmap.db
            changes.log
          key: ${{ steps.restore-state.outputs.cache-primary-key }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
