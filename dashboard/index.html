<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0c0c0e" />
    <title>Availability — AVE Santa Clara</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-gradient" aria-hidden="true"></div>
    <header class="top">
      <div class="top-inner">
        <p class="eyebrow">SightMap snapshot</p>
        <h1 id="headline">Loading…</h1>
        <div class="meta">
          <span id="updated" class="pill muted"></span>
          <span id="status-pill" class="pill"></span>
        </div>
      </div>
    </header>

    <main class="wrap">
      <p id="error" class="error hidden" role="alert"></p>

      <section class="panel" aria-labelledby="avail-heading">
        <div class="panel-head">
          <h2 id="avail-heading">Current availability</h2>
          <span id="unit-count" class="count"></span>
        </div>
        <div id="floors" class="floors"></div>
      </section>

      <section class="panel changes" aria-labelledby="chg-heading">
        <div class="panel-head">
          <h2 id="chg-heading">Changes</h2>
        </div>
        <div id="changes-body" class="changes-body"></div>
      </section>
    </main>

    <footer class="foot">
      <p>Public listing data · Updates when the GitHub Action runs · Not affiliated with AVE</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
